<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Pilih Voting</title>
    <link rel="stylesheet" href="css/home.css">
  <link rel="shortcut icon" href="assets/img/logo_bpm.png" type="image/x-icon">
</head>

<body>

    <div class="top-bar">
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="main">
        <div class="center">

            <div class="logo-box" onclick="goTo('osis')">
                <img src="assets/img/osis-removebg-preview.png" class="logo">
                <div class="menu-text">OSIS</div>
            </div>

            <div class="logo-box" onclick="goTo('mpk')">
                <img src="assets/img/mpk.png" class="logo">
                <div class="menu-text mpk">MPK</div>
            </div>

        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            window.location.href = "login.html";
        }

        function goTo(jenis) {
            window.location.href = "voting_" + jenis + ".html";
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
